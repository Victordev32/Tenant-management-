{%extends 'base_auth.html'%}
{% block content %}
    <div class="flex flex-col items-center justify-center m-5">
      {% for message in messages %}
         <p>{{message}}</p>
      {% endfor%}
      
       <form method="POST" class="shadow-xl shadow-dark rounded m-3 p-3 w-19.9/20 md:w-1/2 lg:1/3">
         {% csrf_token %}
          <h1 class="p-2 text-xl font-bold">Log in</h1>
          <div class="flex flex-col gap-2">
              <label for="username">Username</label>
              <input type="text" class="outline-gray-400 bg-gray-200 p-2 focus:outline-gray-500 border-1 border-none block w-full" name="username" required>
          </div>
         <div class="flex flex-col gap-2">
              <label for="password">Password</label>
              <input type="password" class="outline-gray-400 bg-gray-200 p-2 focus:outline-gray-500 border-1 border-none block w-full" name="password" required>
         </div>
          <button class="bg-green-400 text-white active:bg-green-600 p-2 m-1 rounded" type="submit">Log in</button>
         <div class="p-1 m-1">
           <p>Do not have an account?<a href="{% url 'signup'%}" class="text-underline text-blue-400">Register</a></p>
         </div>
       </form>
    </div>
{% endblock %}
