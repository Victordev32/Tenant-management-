{%extends 'base_auth.html'%}
{% block content %}
    <div class="flex flex-col items-center justify-center m-5">
      {% for message in messages %}
         <p>{{message}}</p>
      {% endfor%}
      
       <form method="POST" class="shadow-lg m-3 p-3 w-19.9/20 md:w-1/2 lg:w-1/3">
         {% csrf_token %}
          <h1 class="p-2 text-xl font-bold">Sign up</h1>
          {{form.as_p }}
          <button class="bg-green-400 text-white active:bg-green-600 p-2 m-1 rounded" type="submit">Sign up</button>
         <div class="p-1 m-1">
           <p>Already have an account?<a href="{% url 'login'%}" class="text-underline text-blue-400">Log in</a></p>
         </div>
       </form>
    </div>
{% endblock %}
